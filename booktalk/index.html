<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>함께읽기ON · 북토크 — 말하지 않고 말하기</title>
<meta property="og:title" content="함께읽기ON 북토크 · 말하지 않고 말하기" />
<meta property="og:description" content="2026. 7. 28(화) 저녁 8시 — 김정운 『말하지 않고 말하기』" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F6F1E7;--ink:#221E18;--soft:#5A5247;--faint:#9A9080;--red:#CC3333;--rule:#D8CFBE;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:"Nanum Myeongjo",serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.2rem;}
  .box{max-width:30rem;width:100%;text-align:center;}
  .brand{font-family:"Nanum Gothic",sans-serif;font-size:.68rem;font-weight:700;
    letter-spacing:.32em;color:var(--red);}
  h1{font-weight:800;font-size:clamp(1.4rem,6vw,1.9rem);line-height:1.4;margin:.9rem 0 .4rem;}
  .when{font-family:"Nanum Gothic",sans-serif;font-size:.74rem;letter-spacing:.14em;color:var(--faint);margin-bottom:2rem;}
  a.btn{display:block;border:1px solid var(--rule);border-left:3px solid var(--red);border-radius:4px;
    background:rgba(255,255,255,.55);padding:1rem 1.2rem;margin-bottom:.7rem;text-decoration:none;
    color:var(--ink);text-align:left;}
  a.btn .t{font-weight:800;font-size:1.02rem;}
  a.btn .d{font-size:.82rem;color:var(--soft);margin-top:.2rem;line-height:1.6;}
  a.pdf{border-left-color:var(--rule);}
  .foot{margin-top:2rem;font-family:"Nanum Gothic",sans-serif;font-size:.64rem;
    letter-spacing:.18em;color:var(--faint);}
</style>
</head>
<body>
  <main class="box">
    <div class="brand">함께읽기 O N</div>
    <h1>말하지 않아도,<br>이미 말하고 있다</h1>
    <p class="when">김정운 『말하지 않고 말하기』 · 2026. 7. 28 화 20:00</p>
    <a class="btn" href="questions.html"><span class="t">나눔 질문 카드</span><br><span class="d">모임 전에 미리 읽는 여섯 개의 질문</span></a>
    <a class="btn" href="cards.html"><span class="t">완독 단어장</span><br><span class="d">색인 73개 낱말 — 카드를 누르면 뜻이 열립니다</span></a>
    <a class="btn" href="deck.html"><span class="t">북토크 슬라이드</span><br><span class="d">당일 함께 볼 자료 — 좌우로 넘겨 보세요</span></a>
    <a class="btn pdf" href="deck.pdf"><span class="t">PDF로 받기</span><br><span class="d">슬라이드 전체를 파일로 저장</span></a>
    <p class="foot">함께읽기 ON · 2026</p>
  </main>
</body>
</html>
